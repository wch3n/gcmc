system:
  snapshot: ../alloy/POSCAR.Ti2CO2
  frame: 0
  repeat: [2, 2, 1]
  fix_below_z:
  adsorbate: H
  adsorbate_anchor_index: 0
  site_elements: [Ti]
  surface_side: top
  site_type: [atop, bridge]
  substrate_elements: [Ti, C]
  functional_elements:
  vertical_offset: 1.8

gcmc:
  temperature: 300.0
  mu_values: [-3.0, -2.0, -1.0, 0.0, 1.0]
  seeds: [81, 82]
  move_mode: hybrid
  site_hop_prob: 0.25
  displacement_sigma: 0.25
  max_displacement_trials: 20
  min_clearance: 0.9
  site_match_tol: 0.6
  surface_layer_tol: 0.5
  termination_clearance: 0.8
  w_insert: 1.0
  w_delete: 1.0
  w_canonical: 1.0
  max_n_adsorbates:
  relax: false
  relax_steps: 10
  fmax: 0.05
  enable_hybrid_md: false
  md_move_prob: 0.0
  md_steps: 0
  md_timestep_fs: 1.0
  md_ensemble: nve
  md_accept_mode: potential
  md_friction: 0.01
  md_planar: false
  md_planar_axis: 2
  md_init_momenta: true
  md_remove_drift: true
  nsweeps: 200
  write_interval: 10
  sample_interval: 2
  equilibration: 40

backend:
  backend: multiprocessing
  n_workers: 1
  devices: [cuda:0]
  ray_address:
  ray_log_to_driver: false
  ray_num_cpus_per_task: 1
  ray_num_gpus_per_task:
  worker_log_to_stdout: false

calculator:
  calculator: lj
  lj_cutoff: 6.0
  model:
  model_file:
  use_kokkos: true

output:
  output_dir: adsorbate_gcmc_scan
