system:
  snapshot: ../../alloy/data/POSCAR.Ti2CO2
  frame: 0
  repeat: [2, 2, 1]
  fix_below_z:
  adsorbate: OH
  adsorbate_anchor_index: 0
  initialization_mode: clean_surface
  coverage: 0.25
  n_adsorbates:
  site_elements: [Ti]
  surface_side: top
  site_type: [atop]
  substrate_elements: [Ti, C]
  functional_elements:
  top_layer_element:
  vertical_offset: 1.8

cmc:
  temperature: 600.0
  move_mode: hybrid
  site_hop_prob: 0.35
  reorientation_prob: 0.35
  rotation_max_angle_deg: 25.0
  displacement_sigma: 0.6
  max_displacement_trials: 20
  max_reorientation_trials: 20
  min_clearance: 0.9
  site_match_tol: 0.6
  surface_layer_tol: 0.5
  termination_clearance: 0.8
  bridge_cutoff:
  z_max_support: 3.5
  detach_tol: 3.0
  relax: false
  relax_steps: 20
  relax_z_only: false
  fmax: 0.05
  verbose_relax: false
  enable_hybrid_md: false
  md_move_prob: 0.1
  md_steps: 50
  md_timestep_fs: 1.0
  md_ensemble: nve
  md_accept_mode: potential
  md_friction: 0.01
  md_planar: false
  md_planar_axis: 2
  md_init_momenta: true
  md_remove_drift: true
  nsweeps: 200
  write_interval: 10
  sample_interval: 2
  equilibration: 40
  seed: 81
  resume: false
  checkpoint_interval: 100

calculator:
  calculator: lj
  lj_cutoff: 6.0
  device: cuda
  model:
  model_file:
  use_kokkos: true

output:
  output_prefix: adsorbate_cmc
